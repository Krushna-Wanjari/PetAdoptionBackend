spring.application.name=PetAdoption

# ---------- Server ----------
server.port=8080

# ---------- Database (MySQL) ----------
# Update the username/password below to match your local MySQL setup,
# or set the DB_USER / DB_PASS environment variables.
spring.datasource.url=jdbc:mysql://localhost:3306/pet_adoption?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Krushn@26

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---------- JWT ----------
# IMPORTANT: change this secret before deploying anywhere real.
# It must be at least 32 characters (256 bits) for HS256.
jwt.secret=${JWT_SECRET:replace-this-with-a-long-random-secret-at-least-32-chars-long}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---------- Swagger / OpenAPI ----------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ---------- CORS ----------
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ---------- Cloudinary (pet image uploads) ----------
